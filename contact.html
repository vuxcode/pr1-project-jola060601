<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- Setting the character encoding to be the standard that supports accents -->
  <title>Contact</title>
  <link href="style.css" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="font-awesome-solid.svg">
</head>
<body>
  <nav class="menu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="games.html">Games</a></li>
    </ul>
  </nav>
  <main class="wrapbox">
    <header><h1>Geography Games</h1></header>
    <article>
      <header><h2>Contact Form</h2></header>
      <form action="https://formspree.io/f/mvzldqkd" method="POST">
        <fieldset id="contactform">
          <legend>Contact Me</legend>
          <label for="name"><u>Enter your name:</u></label>
          <input id="name" name="name" type="name">
          <label for="email"><u>Enter your e-mail:</u></label>
          <input id="email" name="email" type="email">
          <label for="message"><u>Enter your message:</u></label>
          <textarea id="message" name="message" rows="8"></textarea>
        </fieldset>
        <input id="sendbutton" type="submit" value="Send">
      </form>
    </article>
    <footer><p>Published in 2026 by Joakim Lahdo</p></footer>
  </main>
</body>
</html>
