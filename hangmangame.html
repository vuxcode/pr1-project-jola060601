<!-- Hangman game from the "Games" page of webpage -->
<!DOCTYPE html>
<html>
<head>
  <title></title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <nav class="menu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="games.html">Games</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
  <div class="game-modal">
    <div id="hangman-game-modal">
      <h2>Game Over!</h2>
      <p>The correct country was: <b>MONGOLIA</b></p>
      <button onclick="resetGame()">Play again</button>
      <button onclick="window.location.href='games.html'">Return</button>
    </div>
  </div>
  <main class="containerbox">
    <div id="stuckwidth">
      <img src="hangman/hangman-0.svg">
      <h1>Hangman Game</h1>
      <h2 id="guesstext">Guesses: <span>0 / 6</span></h2>
    </div>
    <div id="widenbox">
      <ul class="currentword"></ul>
      <div id="keyboard"></div>
    </div>
  </main>
  <!-- Load the external "js"-file -->
  <script src="countries.js"></script>
  <!-- Load the hangman game -->
  <script src="hangmangame.js"></script>
</body>
</html>
