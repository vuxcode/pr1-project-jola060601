<!-- Hangman game from the "Games" page of webpage -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- Setting the character encoding to be the standard that supports accents -->
  <title>Hangman Game</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <nav class="menu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="games.html">Games</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
  <div class="game-modal">
    <div id="hangman-game-modal">
      <h2>Welcome!</h2>
      <p>Can you guess the correct country before the hanging is concluded? Let's find out!</p>
      <button onclick="resetGame()">Play</button>
      <button onclick="window.location.href='games.html'">Return</button>
    </div>
  </div>
  <main class="containerbox">
    <div id="stuckwidth">
      <img src="" alt="Stick figure of hangman gallow with a circle and five straight lines eventually added when guessing wrong">
      <h1>Hangman Game</h1>
      <h2 id="guesstext">Guesses: <span></span></h2>
    </div>
    <div id="widenbox">
      <ul class="currentword"></ul>
      <div id="keyboard"></div>
    </div>
  </main>
  <!-- Load the external "js"-file -->
  <script src="countries.js"></script>
  <!-- Load the hangman game -->
  <script src="hangmangame.js"></script>
</body>
</html>
