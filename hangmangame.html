<!-- Hangman game from the "Games" page of webpage -->
<!DOCTYPE html>
<html>
<head>
  <title></title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #009DC4;
    }
    div {
      margin: 10px;
    }
    .menu ul {
      background: #228B22;
      list-style-type: none;
      margin: 0;
      overflow: hidden;
      padding: 0;
    }
    .menu li {
      display: inline-block;
    }
    .menu a {
      display: block;
      color: white;
      padding: 16px;
      text-align: center;
      text-decoration: none;
    }
    .menu a:hover {
      background-color: blue;
    }
    .currentword {
      display: flex; /* Add the lines between each other (put it here instead of ".currentword li") */
      gap: 10px; /* Create a gap between the lines (alternative to "padding: 0 10px;"") */
      list-style-type: none;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .currentword li {
      border-bottom: black solid 3px;
      font-size: 24px;
      height: 40px;
      text-transform: uppercase;
      text-align: center;
      width: 30px; /* This will prevent the lines from covering the entire page */
    }
    li.currentletter {
      border-bottom-color: transparent;
    }
  </style>
</head>
<body>
  <nav class="menu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="games.html">Games</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
  <main>
    <div>
      <img src="hangman/hangman-0.svg">
      <h1>Hangman Game</h1>
      <h2>Guesses: 0 / 6</h2>
    </div>
    <div>
      <ul class="currentword">
        <li class="currentletter">a</li>
        <li>n</li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
      </ul>
      <button>A</button><button>B</button><button>C</button><button>D</button><button>E</button><button>F</button><button>G</button><button>H</button>
      <button>I</button><button>J</button><button>K</button><button>L</button><button>M</button><button>N</button><button>O</button><button>P</button>
      <button>Q</button><button>R</button><button>S</button><button>T</button><button>U</button><button>V</button><button>W</button><button>X</button>
      <button>Y</button><button>Z</button><button>Ã</button><button>É</button><button>Í</button><button>Ô</button><button>'</button><button>-</button>
    </div>
  </main>
</body>
</html>
