<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- Setting the character encoding to be the standard that supports accents -->

  <link href="style.css" rel="stylesheet">
</head>
<body>
  <nav class="menu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="games.html">Games</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
  <main class="containerbox">
    <div id="stuckwidth">
      <img src="flags/ad.svg" alt="Picture of a country's flag">
      <h1>Flag Game</h1>
      <h2 id="questiontext">Question: <span>1 / 10</span></h2>
      <h2 id="pointstext">Points: <span>0 / 10</span></h2>
    </div>
    <div id="widenbox">
        <h1>Which country does this flag belong to?</h1>
        <h2 id="timernumber">Time remaining: <span>30</span>s</h2>
        <button>Choice 1</button>
        <button>Choice 2</button>
        <button>Choice 3</button>
        <button>Choice 4</button>
    </div>
  </main>
  <!-- Load the external "js"-file -->
  <script src="countries.js"></script>
  <!-- Load the flag game -->
  <script>
    // Create variables that will be needed in the game (have almost all of them empty at first because they will change during the game play)
    var currentFlag = "";
    var randomArray = [];
    var codeArray = [];
    var countryArray = [];
    var fourSelections = [];
    var fourCodes = [];
    var fourCountries = [];
    var questionNumber = 1;
    var maxQuestions = 10;
    var correctPoints = 0;
    var maxPoints = 10;
    var timer = 30;
    // Get the correct <h2> where the question numbers are displayed (i.e. the <h2> designated with the id="questiontext")
    var questionText = document.querySelector("#questiontext span");
    // Get the correct <h2> where the point numbers are displayed (i.e. the <h2> designated with the id="pointstext")
    var pointsText = document.querySelector("#pointstext span");
    // Get the correct <h2> where the timer number is displayed (i.e. the <h2> designated with the id="timernumber")
    var timerNumber = document.querySelector("#timernumber span");
    // Get the correct <img> where the flag is displayed (i.e. the <div> designated with the id="questiontext")
    var flagImage = document.querySelector("#stuckwidth img");
    // Create a function to generate forty random countries from the list from the "js"-file
    function getFortyCountries() {
      // Create a for-loop to generate a random country forty times
      for (var i = 0; i < 40; i++) {
        // Use Math.floor to round down so that the number in countryList.length won't be called upon and crash the game (index starts at 0 and ends in countryList.length - 1)
        var { code, country } = countryList[Math.floor(Math.random() * countryList.length)];
        // Save the randomly generated codes and countries into the previously defined empty arrays
        randomArray.push([code, country]);
        codeArray.push(code);
        countryArray.push(country);
      }
      // Output the arrays on console log to confirm that the code works
      console.log(randomArray);
      // console.log(codeArray);
      // console.log(countryArray);
    }
    // Run the function to generate forty random countries from the list from the "js"-file
    getFortyCountries();
    // Create a function to have the timer count down
    function countDown() {
      // Print out the correct number on screen
      timerNumber.innerText = `${timer}`;
      // Output the correct time
      console.log(timer);
      // Create a for-loop to count down if the number is greater than zero
      if (timer > 0) {
        // Reduce the number by one
        timer--;
        // Create a loop and run the function again in one second
        setTimeout(countDown, 1000);
      }
      // When the timer reaches zero
      else {
        // Stop the function here
        console.log("Time out!");
      }
    }
    // Run the countdown function
    // countDown();
    // Create a function to start the game
    function startGame() {
      // Create a for-loop to extract four items from randomArray
      for (var n = 0; n < 4; n++) {
        // Remove from randomArray and save in fourSelections
        fourSelections.unshift(randomArray.pop());
      }
      // Output the array on the console
      console.log(fourSelections);
      // Create a for-loop to extract the country codes and names from the new array
      for (var d = 0; d < 4; d++) {
        // Show the country codes and names in the new arrays without removing them from fourSelections
        fourCodes.push(fourSelections[d][0]);
        fourCountries.push(fourSelections[d][1]);
      }
      // Output the new arrays on the console
      console.log(fourCodes);
      console.log(fourCountries);
    }
    // Run the startGame function
    startGame();
  </script>
</body>
</html>
