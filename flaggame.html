<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- Setting the character encoding to be the standard that supports accents -->
  <title>Flag Game</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <nav class="menu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="games.html">Games</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
  <main class="containerbox">
    <div id="stuckwidth">
      <img src="flags/ad.svg" id="flagborder" alt="Picture of a country's flag">
      <h1>Flag Game</h1>
      <h2 id="questiontext">Question: <span>1 / 10</span></h2>
      <h2 id="pointstext">Points: <span>0 / 10</span></h2>
    </div>
    <div id="widenbox">
        <h1>Which country does this flag belong to?</h1>
        <h2 id="timernumber">Time remaining: <span>30</span>s</h2>
        <button onclick="clickButtonQuestion()" id="choice0"></button>
        <button onclick="clickButtonQuestion()" id="choice1"></button>
        <button onclick="clickButtonQuestion()" id="choice2"></button>
        <button onclick="clickButtonQuestion()" id="choice3"></button>
    </div>
  </main>
  <!-- Load the external "js"-file -->
  <script src="countries.js"></script>
  <!-- Load the flag game -->
  <script>
    // Create variables that will be needed in the game (have almost all of them empty at first because they will change during the game play)
    var currentFlag = "";
    var randomArray = [];
    var fourSelections = [];
    var questionNumber = 1;
    var maxQuestions = 10;
    var correctPoints = 0;
    var maxPoints = 10;
    var timer = 30;
    // Get the correct <h2> where the question numbers are displayed (i.e. the <h2> designated with the id="questiontext")
    var questionText = document.querySelector("#questiontext span");
    // Get the correct <h2> where the point numbers are displayed (i.e. the <h2> designated with the id="pointstext")
    var pointsText = document.querySelector("#pointstext span");
    // Get the correct <h2> where the timer number is displayed (i.e. the <h2> designated with the id="timernumber")
    var timerNumber = document.querySelector("#timernumber span");
    // Get the correct <img> where the flag is displayed (i.e. the <div> designated with the id="questiontext")
    var flagImage = document.querySelector("#stuckwidth img");
    // Create four variables to find the button elements on the screen
    var button0 = document.getElementById("choice0");
    var button1 = document.getElementById("choice1");
    var button2 = document.getElementById("choice2");
    var button3 = document.getElementById("choice3");
    // Create a function to generate forty random countries from the list from the "js"-file
    function getFortyCountries() {
      // Create a while-loop to generate forty random and unique countries
      while (randomArray.length < 40) {
        // Use Math.floor to round down so that the number in countryList.length won't be called upon and crash the game (index starts at 0 and ends in countryList.length - 1)
        var { code, country } = countryList[Math.floor(Math.random() * countryList.length)];
        // Check to see if code already exists inside randomArray (use .some() instead of .includes() because the former can check inside an array inside of another array)
        var isDuplicate = randomArray.some(item => item[0] == code);
        // Create an if-statement to check whether isDuplicate is true or false
        if (!isDuplicate) {
          // Save the randomly generated code and country into the empty array
          randomArray.push([code, country]);
        }
        // Otherwise don't add it to the array
        else {
          // Output a message
          // console.log(code + " already exists.");
        }
      }
      // Use nested loops to access each element
      // for (let r = 0; r < randomArray.length; r++) {
      //   for (let c = 0; c < randomArray[r].length; c++) {
      //     console.log(randomArray[r][c]);
      //   }
      // }
      // Output the arrays on console log to confirm that the code works
      console.log(randomArray);
    }
    // Run the function to generate forty random countries from the list from the "js"-file
    getFortyCountries();
    // Create a function to have the timer count down
    function countDown() {
      // Print out the correct number on screen
      timerNumber.innerText = `${timer}`;
      // Output the correct time
      console.log(timer);
      // Create a for-loop to count down if the number is greater than zero
      if (timer > 0) {
        // Reduce the number by one
        timer--;
        // Create a loop and run the function again in one second
        setTimeout(countDown, 1000);
      }
      // When the timer reaches zero
      else {
        // Stop the function here
        console.log("Time out!");
      }
    }
    // Run the countdown function
    // countDown();
    // Create a function to increase the question number each time one button is clicked
    function clickButtonQuestion() {
      console.log(questionNumber + " for clickButtonQuestion function.")
      // Increase the question number when a button is clicked when the question number is less than or equal to the maximum question
      if (questionNumber <= maxQuestions) {
        questionNumber++;
      }
      // If all ten questions are answered, put out a message on screen
      if (questionNumber > maxQuestions) {
        console.log("Game over!");
      }
      // Run the startGame function
      startGame();
    }
    // Create a function to start the game
    function startGame() {
      console.log(questionNumber + " for startGame function.")
      // Have the four selections be empty when starting a new question
      fourSelections = [];
      // Create a for-loop to extract four items from randomArray
      for (var n = 0; n < 4; n++) {
        // Remove from randomArray and save in fourSelections
        fourSelections.unshift(randomArray.pop());
      }
      // Output the array on the console
      console.log(fourSelections);
      // Check to see that the computer can find the button elements
      // console.log(button0);
      // console.log(button1);
      // console.log(button2);
      // console.log(button3);
      // Add country names to the buttons
      button0.innerHTML = fourSelections[0][1];
      button1.innerHTML = fourSelections[1][1];
      button2.innerHTML = fourSelections[2][1];
      button3.innerHTML = fourSelections[3][1];
      // Let one of the four selections be the correct choice
      currentFlag = fourSelections[Math.floor(Math.random() * 4)];
      // Check to see that one selection was made
      console.log(currentFlag);
      // Print out the question numbers on screen
      questionText.innerText = `${questionNumber} / ${maxQuestions}`;
      // Print out the point numbers on screen
      pointsText.innerText = `${correctPoints} / ${maxPoints}`;
      // Choose a random flag from one of the four selections
      flagImage.src = `flags/${currentFlag[0]}.svg`;
    }
    // Run the startGame function
    startGame();
  </script>
</body>
</html>
